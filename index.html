<!doctype html>
<html lang="hu">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Számtani Sorozatok - Tanulókártyák</title>
  <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            padding: 40px;
        }

        .card-container {
            perspective: 1000px;
            margin-bottom: 30px;
        }

        .flashcard {
            width: 100%;
            height: 300px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .card-front {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #333;
        }

        .card-back {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
            transform: rotateY(180deg);
        }

        .question {
            font-size: 1.4rem;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .sequence {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
        }

        .sequence-table {
            width: 100%;
            margin: 15px 0;
            border-collapse: collapse;
        }

        .sequence-table td {
            padding: 12px 8px;
            text-align: center;
            border: 2px solid #667eea;
            font-weight: 600;
        }

        .sequence-table tr:first-child td {
            background: #e8ecf1;
            font-size: 1rem;
        }

        .sequence-table tr:last-child td {
            background: white;
            font-size: 1.3rem;
            color: #2c3e50;
        }

        .sequence-table td.hidden-value {
            background: #f0f0f0;
            color: #999;
            font-size: 1.5rem;
        }

        .answer {
            font-size: 1.3rem;
            text-align: center;
            line-height: 1.6;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(240, 147, 251, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.4);
        }

        .progress {
            background: #f0f0f0;
            border-radius: 10px;
            height: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .hint {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 0.95rem;
            color: #856404;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .main-content {
                padding: 20px;
            }
            
            .flashcard {
                height: 250px;
            }
            
            .question {
                font-size: 1.2rem;
            }
            
            .sequence {
                font-size: 1.5rem;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 200px;
            }
        }
    </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>

 </head>
 <body>
  <div class="container">
   <div class="header">
    <h1>📚 Számtani sorozatok</h1>
    <p>Interaktív tanulókártyák a számtani sorozatok elsajátításához</p>
   </div>
   <div class="main-content">
    <div class="progress">
     <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="card-container">
     <div class="flashcard" id="flashcard">
      <div class="card-face card-front">
       <div class="question" id="question">
        Kattints a kártyára a kezdéshez!
       </div>
       <div class="sequence" id="sequence"></div>
      </div>
      <div class="card-face card-back">
       <div class="answer" id="answer"></div>
      </div>
     </div>
    </div>
    <div class="controls"><button class="btn btn-primary" onclick="generateNewCard()">Új Kártya</button> <button class="btn btn-secondary" onclick="flipCard()">Megoldás</button> <button class="btn btn-success" onclick="markCorrect()">Helyes ✓</button>
    </div>
    <div class="hint">
     💡 <strong>Emlékeztető:</strong> Számtani sorozatban minden szomszédos tag különbsége állandó (d). Az n-edik tag képlete: a<sub>n</sub> = a<sub>1</sub> + (n-1)×d
    </div>
    <div class="stats">
     <div class="stat-item">
      <div class="stat-number" id="totalCards">
       0
      </div>
      <div class="stat-label">
       Összes kártya
      </div>
     </div>
     <div class="stat-item">
      <div class="stat-number" id="correctCards">
       0
      </div>
      <div class="stat-label">
       Helyes válaszok
      </div>
     </div>
     <div class="stat-item">
      <div class="stat-number" id="accuracy">
       0%
      </div>
      <div class="stat-label">
       Pontosság
      </div>
     </div>
    </div>
   </div>
  </div>
  <script>
        let currentCard = null;
        let totalCards = 0;
        let correctCards = 0;
        let isFlipped = false;

        const cardTypes = [
            'findNext', 'findFirst', 'findDifference', 'findNth', 'findSum'
        ];

        function generateArithmeticSequence() {
            const firstTerm = Math.floor(Math.random() * 20) - 10;
            const difference = Math.floor(Math.random() * 10) + 1;
            const length = Math.floor(Math.random() * 3) + 4;
            
            const sequence = [];
            for (let i = 0; i < length; i++) {
                sequence.push(firstTerm + i * difference);
            }
            
            return { sequence, firstTerm, difference };
        }

        function generateCard() {
            const cardType = cardTypes[Math.floor(Math.random() * cardTypes.length)];
            const { sequence, firstTerm, difference } = generateArithmeticSequence();
            
            let question, answer, displaySequence;
            
            switch (cardType) {
                case 'findNext':
                    displaySequence = createSequenceTable(sequence, -1);
                    question = 'Mi a következő tag a sorozatban?';
                    answer = `A következő tag: <strong>${sequence[sequence.length - 1]}</strong><br><br>
                             Magyarázat: A közös különbség d = ${difference}<br>
                             ${sequence[sequence.length - 2]} + ${difference} = ${sequence[sequence.length - 1]}`;
                    break;
                    
                case 'findFirst':
                    displaySequence = createSequenceTable(sequence, 0);
                    question = 'Mi az első tag (a<sub>1</sub>) ebben a számtani sorozatban?';
                    answer = `Az első tag: <strong>a<sub>1</sub> = ${firstTerm}</strong><br><br>
                             Magyarázat: A közös különbség d = ${difference}<br>
                             ${sequence[1]} - ${difference} = ${firstTerm}`;
                    break;
                    
                case 'findDifference':
                    displaySequence = createSequenceTable(sequence, -1);
                    question = 'Mi a közös különbség (d) ebben a számtani sorozatban?';
                    answer = `A közös különbség: <strong>d = ${difference}</strong><br><br>
                             Magyarázat: ${sequence[1]} - ${sequence[0]} = ${difference}<br>
                             ${sequence[2]} - ${sequence[1]} = ${difference}`;
                    break;
                    
                case 'findNth':
                    const n = Math.floor(Math.random() * 5) + 7;
                    const nthTerm = firstTerm + (n - 1) * difference;
                    displaySequence = createSequenceTable(sequence, -1);
                    question = `Mi a sorozat ${n}. tagja (a<sub>${n}</sub>)?`;
                    answer = `A ${n}. tag: <strong>a<sub>${n}</sub> = ${nthTerm}</strong><br><br>
                             Képlet: a<sub>n</sub> = a<sub>1</sub> + (n-1)×d<br>
                             a<sub>${n}</sub> = ${firstTerm} + (${n}-1)×${difference} = ${nthTerm}`;
                    break;
                    
                case 'findSum':
                    const sumN = sequence.length;
                    const lastTerm = firstTerm + (sumN - 1) * difference;
                    const sum = (sumN * (firstTerm + lastTerm)) / 2;
                    displaySequence = createSequenceTable(sequence, -1);
                    question = `Mi az első ${sumN} tag összege?`;
                    answer = `Az összeg: <strong>S<sub>${sumN}</sub> = ${sum}</strong><br><br>
                             Képlet: S<sub>n</sub> = n×(a<sub>1</sub> + (n-1)×d)/2<br>
                             S<sub>${sumN}</sub> = ${sumN}×(${firstTerm} + (${sumN}-1)×${difference})/2 = ${sum}`;
                    break;
            }
            
            return { question, answer, displaySequence };
        }

        function createSequenceTable(sequence, hiddenIndex) {
            let html = '<table class="sequence-table"><tr>';
            
            // Első sor: tag nevei (a_1, a_2, stb.)
            for (let i = 0; i < sequence.length; i++) {
                html += `<td>a<sub>${i + 1}</sub></td>`;
            }
            html += '</tr><tr>';
            
            // Második sor: értékek
            for (let i = 0; i < sequence.length; i++) {
                if (i === hiddenIndex) {
                    html += '<td class="hidden-value">?</td>';
                } else {
                    html += `<td>${sequence[i]}</td>`;
                }
            }
            html += '</tr></table>';
            
            return html;
        }

        window.generateNewCard = function() {
            currentCard = generateCard();
            document.getElementById('question').innerHTML = currentCard.question;
            document.getElementById('sequence').innerHTML = currentCard.displaySequence;
            document.getElementById('answer').innerHTML = currentCard.answer;
            
            const flashcard = document.getElementById('flashcard');
            flashcard.classList.remove('flipped');
            isFlipped = false;
            
            totalCards++;
            updateStats();
        };

        window.flipCard = function() {
            const flashcard = document.getElementById('flashcard');
            flashcard.classList.toggle('flipped');
            isFlipped = !isFlipped;
        };

        window.markCorrect = function() {
            if (currentCard) {
                correctCards++;
                updateStats();
                window.generateNewCard();
            }
        };

        function updateStats() {
            document.getElementById('totalCards').textContent = totalCards;
            document.getElementById('correctCards').textContent = correctCards;
            
            const accuracy = totalCards > 0 ? Math.round((correctCards / totalCards) * 100) : 0;
            document.getElementById('accuracy').textContent = accuracy + '%';
            
            const progress = totalCards > 0 ? (correctCards / totalCards) * 100 : 0;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        document.addEventListener('DOMContentLoaded', function() {
            const flashcard = document.getElementById('flashcard');
            if (flashcard) {
                flashcard.addEventListener('click', window.flipCard);
            }
            window.generateNewCard();
        });
    </script>
